<!DOCTYPE html>
<html lang="en">
<head>
    <title>OWNER ENAFUL - Advanced Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="owner-enafal-container">
        <h1 class="brand-name">OWNER ENAFUL</h1>
        <div class="clock-face">
            <div class="hand hour" id="hr"></div>
            <div class="hand minute" id="mn"></div>
            <div class="hand second" id="sc"></div>
        </div>
        <div id="digital-clock">00:00:00</div>
        <button id="mode-switch">Toggle Dark/Light</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
